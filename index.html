<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mayhem Operator Scavenger Hunt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap');

  :root {
    --chrome: #2b3648; --chrome-deep: #212a38;
    --flame: #f0561d; --flame-soft: #fdeee7;
    --ink: #1e2530; --ink-soft: #5b6472;
    --paper: #f2f4f7; --card: #ffffff; --line: #dfe3ea;
    --good: #1a7f4e; --good-soft: #e7f4ed;
    --warn: #c53a3a; --warn-soft: #fceeee;
    --learn: #2c5aa0; --learn-soft: #eef4fc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: var(--paper); color: var(--ink); font-family: 'Barlow', Arial, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'Roboto Mono', Consolas, monospace; }

  .chrome { background: var(--chrome); color: #fff; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .brand img { height: 34px; display: block; }
  .chrome-right { font-size: 13px; color: #c4cbd6; }
  .hud { display: flex; align-items: center; gap: 10px; }
  .hud-cell { text-align: right; }
  .hud-chip { background: var(--chrome-deep); border: 1px solid #3a4658; border-radius: 6px; padding: 5px 12px; font-family: 'Roboto Mono', Consolas, monospace; font-size: 15px; font-weight: 600; color: #fff; display: inline-block; }
  .hud-chip.low { color: #ff9b7a; border-color: var(--flame); }
  .hud-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #8b95a6; display: block; }

  .shell { max-width: 760px; margin: 0 auto; padding: 30px 20px 70px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; }
  h1.title { font-size: 38px; font-weight: 800; margin: 8px 0 10px; letter-spacing: -0.01em; text-transform: uppercase; }
  .lede { color: var(--ink-soft); font-size: 16px; line-height: 1.6; max-width: 640px; margin: 0 0 20px; }

  .scenario { background: var(--chrome); color: #fff; border-radius: 10px; padding: 20px 22px; margin-bottom: 20px; border-left: 5px solid var(--flame); }
  .scenario .eyebrow { color: #9aa5b5; }
  .scenario p { margin: 6px 0 0; font-size: 17px; line-height: 1.55; font-weight: 600; }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 22px; margin-bottom: 14px; }
  .label { display: block; font-size: 13px; font-weight: 700; color: var(--ink-soft); margin-bottom: 6px; }
  .field { width: 100%; padding: 11px 12px; font-size: 15px; border: 1px solid var(--line); border-radius: 8px; font-family: inherit; color: var(--ink); background: #fff; }
  .field:focus { outline: 2px solid var(--flame); outline-offset: 1px; border-color: var(--flame); }

  .btn { display: inline-block; padding: 12px 24px; border-radius: 8px; border: none; background: var(--flame); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); font-weight: 600; }
  .btn.navy { background: var(--chrome); }
  .btn.small { padding: 9px 16px; font-size: 14px; }
  .btn.big { padding: 15px 34px; font-size: 17px; }

  .round-context { margin: 18px 0 14px; }
  .round-bar { height: 3px; width: 46px; background: var(--flame); border-radius: 2px; margin-bottom: 10px; }
  .round-context h2 { font-size: 20px; font-weight: 800; margin: 0 0 4px; }
  .round-context p { margin: 0 0 10px; color: var(--ink-soft); font-size: 14.5px; line-height: 1.5; }
  .step-meta { font-size: 13px; color: var(--ink-soft); font-weight: 700; margin-bottom: 8px; }

  .item { background: var(--card); border: 1px solid var(--line); border-radius: 10px; display: flex; overflow: hidden; }
  .item-rail { width: 6px; flex-shrink: 0; background: var(--line); }
  .item.done .item-rail { background: var(--good); }
  .item-body { flex: 1; padding: 22px 24px; }
  .item-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .type-tag { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; padding: 4px 10px; border-radius: 5px; }
  .type-tag.hunt { color: var(--flame); background: var(--flame-soft); }
  .type-tag.quiz, .type-tag.multi { color: #2c5aa0; background: #eaf1fa; }
  .type-tag.extra { color: #7a5af0; background: #f1edfd; }
  .pts { font-size: 12px; color: var(--ink-soft); font-weight: 700; }

  .context-box { background: var(--paper); border-left: 4px solid var(--chrome); border-radius: 0 8px 8px 0; padding: 12px 14px; margin: 0 0 14px; font-size: 14.5px; line-height: 1.55; }
  .ctx-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; color: var(--ink-soft); display: block; margin-bottom: 4px; }

  .prompt { font-size: 17px; line-height: 1.55; margin: 0 0 14px; font-weight: 600; }
  .answer-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .answer-row .field { flex: 1; min-width: 200px; }

  .opts { display: grid; gap: 8px; }
  .opt { text-align: left; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--line); background: #fff; font-size: 15px; cursor: pointer; font-family: inherit; color: var(--ink); }
  .opt.picked { border-color: var(--warn); background: var(--warn-soft); }
  .opt.selected { border-color: var(--chrome); background: #eef1f6; font-weight: 600; }
  .opt.won { border-color: var(--good); background: var(--good-soft); font-weight: 700; }
  .multi-actions { margin-top: 12px; }

  .done-pill { display: inline-flex; gap: 6px; align-items: center; font-size: 14px; font-weight: 700; color: var(--good); background: var(--good-soft); padding: 6px 14px; border-radius: 999px; }
  .learn-box { background: var(--learn-soft); border-left: 4px solid var(--learn); border-radius: 0 8px 8px 0; padding: 12px 14px; margin-top: 14px; font-size: 14.5px; line-height: 1.6; }
  .learn-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; color: var(--learn); display: block; margin-bottom: 4px; }
  .reveal-link { margin-top: 12px; }
  .resource-row { margin: 0 0 14px; }
  .miss { font-size: 13px; color: var(--warn); margin: 8px 0 0; min-height: 1em; }
  .hint-link { background: none; border: none; padding: 0; font-size: 13px; color: var(--ink-soft); text-decoration: underline; cursor: pointer; font-family: inherit; margin-top: 12px; }
  .hint-text { font-size: 13px; color: var(--ink-soft); margin-top: 8px; background: var(--paper); padding: 8px 10px; border-radius: 6px; }
  .hidden { display: none !important; }

  .continue-row { display: flex; justify-content: flex-end; margin-top: 14px; }
  .timeout { border-color: var(--warn) !important; background: var(--warn-soft) !important; }

  .round-break { text-align: center; padding: 60px 20px; }
  .round-break .check { font-size: 15px; font-weight: 700; color: var(--good); background: var(--good-soft); display: inline-block; padding: 7px 18px; border-radius: 999px; margin-bottom: 22px; }
  .round-break h2 { font-size: 34px; font-weight: 800; margin: 0 0 10px; text-transform: uppercase; }
  .break-bar { height: 4px; width: 70px; background: var(--flame); border-radius: 2px; margin: 0 auto 18px; }
  .round-break p { color: var(--ink-soft); max-width: 460px; margin: 0 auto 30px; font-size: 16.5px; line-height: 1.6; }

  .finish { text-align: center; padding: 44px 20px; }
  .finish h2 { font-size: 30px; font-weight: 800; margin: 0; }
  .score-row { display: flex; gap: 14px; justify-content: center; margin: 22px 0; flex-wrap: wrap; }
  .score-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 18px 28px; min-width: 150px; }
  .score-card .big { font-family: 'Roboto Mono', Consolas, monospace; font-size: 38px; font-weight: 600; }
  .score-card .big.flame { color: var(--flame); }
  .finish p { color: var(--ink-soft); max-width: 500px; margin: 0 auto 26px; line-height: 1.6; }
  .finish-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; flex-wrap: wrap; gap: 10px; }
  .keytable { width: 100%; border-collapse: collapse; font-size: 14px; }
  .keytable th, .keytable td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .keytable th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); }

  @media (max-width: 560px) {
    h1.title { font-size: 28px; }
    .round-break h2 { font-size: 26px; }
    .hud-chip { font-size: 13px; }
    .chrome-right { display: none; }
  }
</style>
</head>

function flatten(rounds) {
  var out = [];
  rounds.forEach(function (round, rIdx) {
    round.items.forEach(function (item, iIdx) {
      var copy = Object.assign({}, item);
      copy.round = round; copy.rIdx = rIdx; copy.iIdx = iIdx;
      out.push(copy);
    });
  });
  return out;
}
var MAIN = flatten(CONFIG.rounds.filter(function (r) { return !r.extraCredit; }));
var EXTRA = flatten(CONFIG.rounds.filter(function (r) { return r.extraCredit; }));
var MAX_SCORE = MAIN.reduce(function (s, i) { return s + POINTS[i.type]; }, 0);
var MAX_EXTRA = EXTRA.reduce(function (s, i) { return s + POINTS[i.type]; }, 0);

var S = {
  screen: "start", teamName: "", cursor: 0,
  secondsLeft: CONFIG.timeLimitMinutes * 60, finishTime: null,
  done: {}, pickedWrong: {}, multiSel: {}, hintsUsed: {}, hintsOpen: {},
  entries: {}, score: 0, showKey: false, timer: null
};

function list() { return S.screen === "extra" ? EXTRA : MAIN; }
function cur() { return list()[S.cursor]; }
function isLast() { return S.cursor === list().length - 1; }
function fmt(secs) { var m = Math.floor(secs / 60), s = secs % 60; return m + ":" + (s < 10 ? "0" : "") + s; }
function norm(s) { return s.trim().toUpperCase().replace(/\s+/g, " "); }
function normTight(s) { return s.trim().toUpperCase().replace(/[\s-]+/g, ""); }
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

function startTimer() {
  stopTimer();
  S.timer = setInterval(function () {
    if (S.secondsLeft > 0) {
      S.secondsLeft--;
      var chip = document.getElementById("timerChip");
      if (chip) {
        chip.textContent = fmt(S.secondsLeft);
        if (S.secondsLeft <= 60) chip.classList.add("low");
      }
      if (S.secondsLeft === 0) {
        var t = document.getElementById("timeoutPanel");
        if (t) t.classList.remove("hidden");
      }
    }
  }, 1000);
}
function stopTimer() { if (S.timer) { clearInterval(S.timer); S.timer = null; } }

function updateScoreChip() {
  var chip = document.getElementById("scoreChip");
  if (chip) chip.textContent = S.score;
}

function completeItem(item) {
  S.done[item.id] = true;
  S.score += POINTS[item.type];
  render();
}

function advance() {
  var L = list();
  if (!isLast()) {
    var next = L[S.cursor + 1];
    if (S.screen === "play" && next.rIdx !== cur().rIdx) { S.screen = "roundBreak"; }
    else { S.cursor++; }
    render();
    return;
  }
  if (S.screen === "play") {
    stopTimer();
    S.finishTime = CONFIG.timeLimitMinutes * 60 - S.secondsLeft;
    S.screen = "interstitial";
  } else {
    S.screen = "done";
  }
  render();
}

// ─── HTML builders ───
function hudHTML() {
  if (S.screen === "play" || S.screen === "extra" || S.screen === "roundBreak") {
    var timeVal = S.screen === "extra" ? fmt(S.finishTime || 0) : fmt(S.secondsLeft);
    var low = S.screen !== "extra" && S.secondsLeft <= 60 ? " low" : "";
    return '<div class="hud">' +
      '<div class="hud-cell"><span class="hud-label">Score</span><span class="hud-chip" id="scoreChip">' + S.score + '</span></div>' +
      '<div class="hud-cell"><span class="hud-label">Question</span><span class="hud-chip">' + Math.min(S.cursor + 1, list().length) + '/' + list().length + '</span></div>' +
      '<div class="hud-cell"><span class="hud-label">Time</span><span class="hud-chip' + low + '" id="timerChip">' + timeVal + '</span></div>' +
      '</div>';
  }
  return '<span>Stakeholder Training · ' + esc(CONFIG.clientName) + '</span>';
}

function itemHTML(item) {
  var doneNow = !!S.done[item.id];
  var tagClass = item.round.extraCredit ? "extra" : item.type;
  var tagText = item.round.extraCredit ? "Extra credit" : item.type === "hunt" ? "Hunt" : item.type === "multi" ? "Select all" : "Quiz";
  var h = "";

  h += '<div class="round-context"><div class="round-bar"></div><h2>' + esc(item.round.name) + '</h2><p>' + esc(item.round.story) + '</p>';
  if (item.round.roundLink) h += '<a class="btn navy small" href="' + item.round.roundLink + '" target="_blank" rel="noopener">' + esc(item.round.roundLinkLabel || "Open link") + ' ↗</a>';
  h += '</div>';

  h += '<div class="step-meta">Question ' + (item.iIdx + 1) + ' of ' + item.round.items.length + ' in this round</div>';

  h += '<div class="item' + (doneNow ? " done" : "") + '"><div class="item-rail"></div><div class="item-body">';
  h += '<div class="item-head"><span class="type-tag ' + tagClass + '">' + tagText + '</span><span class="pts">' + POINTS[item.type] + ' pts</span></div>';
  if (item.context) {
    h += '<div class="context-box"><span class="ctx-label">Where to go</span>' + esc(item.context);
    if (item.resourceLink && !doneNow) h += '<div style="margin-top:10px"><a class="btn navy small" href="' + item.resourceLink + '" target="_blank" rel="noopener">' + esc(item.resourceLinkLabel || "Open resource") + ' ↗</a></div>';
    h += '</div>';
  } else if (item.resourceLink && !doneNow) {
    h += '<div class="resource-row"><a class="btn navy small" href="' + item.resourceLink + '" target="_blank" rel="noopener">' + esc(item.resourceLinkLabel || "Open resource") + ' ↗</a></div>';
  }
  h += '<p class="prompt">' + esc(item.prompt) + '</p>';

  if (doneNow) {
    var extraTxt = item.type === "hunt" && S.entries[item.id] ? ": " + esc(S.entries[item.id]) : "";
    h += '<span class="done-pill">✓ Complete' + extraTxt + '</span>';
    if (item.learn) h += '<div class="learn-box"><span class="learn-label">Why this matters</span>' + esc(item.learn) + '</div>';
    if (item.link) h += '<div class="reveal-link"><a class="btn small" href="' + item.link + '" target="_blank" rel="noopener">' + esc(item.linkLabel || "Open link") + ' ↗</a></div>';
    var btnTxt = isLast() ? (S.screen === "play" ? "Finish the hunt" : "Finish") : "Next question →";
    h += '<div class="continue-row"><button class="btn" id="btnNext">' + btnTxt + '</button></div>';
  } else if (item.type === "hunt") {
    h += '<div class="answer-row"><input class="field mono" id="huntInput" placeholder="' + esc(item.placeholder || "") + '" />' +
      '<button class="btn small" id="btnVerify">Verify</button></div><p class="miss" id="missMsg"></p>';
  } else if (item.type === "multi") {
    h += '<div class="opts">';
    item.options.forEach(function (opt, idx) {
      var sel = (S.multiSel[item.id] || []).indexOf(idx) >= 0 ? " selected" : "";
      h += '<button class="opt multi-opt' + sel + '" data-idx="' + idx + '">' + esc(opt) + '</button>';
    });
    h += '</div><div class="multi-actions"><button class="btn small" id="btnMultiSubmit">Submit selections</button></div><p class="miss" id="missMsg"></p>';
  } else {
    h += '<div class="opts">';
    item.options.forEach(function (opt, idx) {
      var picked = (S.pickedWrong[item.id] || []).indexOf(idx) >= 0 ? " picked" : "";
      h += '<button class="opt quiz-opt' + picked + '" data-idx="' + idx + '">' + esc(opt) + '</button>';
    });
    h += '</div>';
  }

  if (!doneNow) {
    h += '<button class="hint-link" id="btnHint">' + (S.hintsOpen[item.id] ? "Hide hint" : "Need a hint? (−" + POINTS.hintCost + " pts)") + '</button>';
    h += '<div class="hint-text' + (S.hintsOpen[item.id] ? "" : " hidden") + '" id="hintText">' + esc(item.hint || "") + '</div>';
  }
  h += '</div></div>';
  return h;
}

function keyHTML() {
  var rows = MAIN.concat(EXTRA).map(function (i) {
    var ans;
    if (i.type === "hunt") ans = i.answers.indexOf("ANY") >= 0 ? "Any entry" : i.answers.join(", ");
    else if (i.type === "multi") ans = i.corrects.map(function (c) { return i.options[c]; }).join(" + ");
    else ans = i.options[i.correct];
    return '<tr><td>' + esc(i.prompt.slice(0, 60)) + '…</td><td>' + i.type + (i.round.extraCredit ? " (extra)" : "") + '</td><td class="mono">' + esc(ans) + '</td><td>' + esc(i.hint || "") + '</td></tr>';
  }).join("");
  return '<div class="panel" style="margin-top:12px"><table class="keytable"><thead><tr><th>Item</th><th>Type</th><th>Answer</th><th>Hint shown</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function footerHTML() {
  return '<div class="footer-row"><span class="eyebrow">For internal training use · ' + esc(CONFIG.clientName) + '</span>' +
    '<button class="btn ghost small" id="btnKey">' + (S.showKey ? "Hide answer key" : "Facilitator answer key") + '</button></div>' +
    (S.showKey ? keyHTML() : "");
}

function render() {
  var app = document.getElementById("app");
  document.getElementById("chromeRight").innerHTML = hudHTML();
  var h = "";

  if (S.screen === "start") {
    h += '<span class="eyebrow">Stakeholder Training Session</span><h1 class="title">' + esc(CONFIG.huntTitle) + '</h1>';
    h += '<div class="scenario"><span class="eyebrow">Your scenario</span><p>' + esc(CONFIG.scenario) + '</p></div>';
    h += '<p class="lede">' + esc(CONFIG.subtitle) + '</p>';
    h += '<div class="panel"><label class="label" for="teamInput">Team name</label><input class="field" id="teamInput" placeholder="e.g. Data Hall Heroes" value="' + esc(S.teamName) + '" /></div>';
    h += '<div class="panel" style="font-size:14.5px;color:var(--ink-soft);line-height:1.6"><strong style="color:var(--ink)">How it works:</strong> ' + esc(CONFIG.teamNote) +
      ' Each step tells you where to go. Read the guidance, then answer. Correct answers unlock a short "why this matters" note. Quiz = ' + POINTS.quiz + ' pts · Select all = ' + POINTS.multi + ' pts · Hunt = ' + POINTS.hunt + ' pts · hints −' + POINTS.hintCost + ' · wrong picks −' + POINTS.wrongQuizCost + '.</div>';
    h += '<button class="btn" id="btnStart"' + (S.teamName.trim() ? "" : " disabled") + '>Start the clock</button>';
  }

  else if (S.screen === "play" || S.screen === "extra") {
    var extraNote = S.screen === "extra" ? " · Extra credit (untimed)" : "";
    h += '<span class="eyebrow">' + esc(S.teamName) + extraNote + '</span>';
    h += '<div class="panel timeout' + (S.screen === "play" && S.secondsLeft === 0 ? "" : " hidden") + '" id="timeoutPanel" style="margin-top:12px"><strong>Time\'s up.</strong> Finish your current entry, and the facilitator will walk through the answers together.</div>';
    h += itemHTML(cur());
    h += footerHTML();
  }

  else if (S.screen === "roundBreak") {
    var nxt = list()[S.cursor + 1].round;
    h += '<div class="round-break"><span class="check">✓ ' + esc(cur().round.name) + ' complete</span>' +
      '<h2>' + esc(nxt.name) + '</h2><div class="break-bar"></div><p>' + esc(nxt.story) + '</p>' +
      '<button class="btn big" id="btnBreak">Start ' + esc(nxt.name.split(":")[0]) + ' →</button></div>';
  }

  else if (S.screen === "interstitial") {
    h += '<div class="finish"><span class="eyebrow">' + esc(S.teamName) + '</span><h2>Scenario resolved</h2>' +
      '<div class="score-row">' +
      '<div class="score-card"><span class="hud-label" style="color:var(--ink-soft)">Score</span><div class="big flame">' + S.score + '</div><span style="font-size:12px;color:var(--ink-soft)">of ' + MAX_SCORE + '</span></div>' +
      '<div class="score-card"><span class="hud-label" style="color:var(--ink-soft)">Time</span><div class="big">' + fmt(S.finishTime || 0) + '</div><span style="font-size:12px;color:var(--ink-soft)">of ' + CONFIG.timeLimitMinutes + ':00</span></div>' +
      '</div><p>You took the flickering lamp from discovery to resolution: reported as an incident, then worked as a field service task. Raise your hand so the facilitator can log your score and time. If the room is still hunting, try the extra credit round: ' + MAX_EXTRA + ' bonus points available.</p>' +
      '<div class="finish-actions"><button class="btn" id="btnExtra">Extra credit →</button><button class="btn ghost" id="btnFinish">Finish here</button></div></div>';
  }

  else if (S.screen === "done") {
    h += '<div class="finish"><span class="eyebrow">' + esc(S.teamName) + '</span><h2>Hunt complete</h2>' +
      '<div class="score-row">' +
      '<div class="score-card"><span class="hud-label" style="color:var(--ink-soft)">Final score</span><div class="big flame">' + S.score + '</div><span style="font-size:12px;color:var(--ink-soft)">of ' + (MAX_SCORE + MAX_EXTRA) + ' possible</span></div>' +
      '<div class="score-card"><span class="hud-label" style="color:var(--ink-soft)">Hunt time</span><div class="big">' + fmt(S.finishTime || 0) + '</div><span style="font-size:12px;color:var(--ink-soft)">of ' + CONFIG.timeLimitMinutes + ':00</span></div>' +
      '</div><p>The loop you just ran (report it, work it, document it) is the loop you\'ll run after go-live. QRGs for each of your tasks are coming as part of the training plan.</p>' +
      '<button class="btn ghost" id="btnReset">Reset for next team</button></div>';
    h += footerHTML();
  }

  app.innerHTML = h;
  bind();
}

function bind() {
  var item = (S.screen === "play" || S.screen === "extra") ? cur() : null;

  var teamInput = document.getElementById("teamInput");
  if (teamInput) {
    teamInput.addEventListener("input", function () {
      S.teamName = teamInput.value;
      var b = document.getElementById("btnStart");
      if (b) b.disabled = !S.teamName.trim();
    });
  }
  var btnStart = document.getElementById("btnStart");
  if (btnStart) btnStart.addEventListener("click", function () { S.screen = "play"; render(); startTimer(); });

  var btnNext = document.getElementById("btnNext");
  if (btnNext) btnNext.addEventListener("click", advance);

  var btnBreak = document.getElementById("btnBreak");
  if (btnBreak) btnBreak.addEventListener("click", function () { S.cursor++; S.screen = "play"; render(); });

  var btnExtra = document.getElementById("btnExtra");
  if (btnExtra) btnExtra.addEventListener("click", function () { S.cursor = 0; S.screen = "extra"; render(); });

  var btnFinish = document.getElementById("btnFinish");
  if (btnFinish) btnFinish.addEventListener("click", function () { S.screen = "done"; render(); });

  var btnReset = document.getElementById("btnReset");
  if (btnReset) btnReset.addEventListener("click", function () {
    stopTimer();
    S = { screen: "start", teamName: "", cursor: 0, secondsLeft: CONFIG.timeLimitMinutes * 60, finishTime: null, done: {}, pickedWrong: {}, multiSel: {}, hintsUsed: {}, hintsOpen: {}, entries: {}, score: 0, showKey: false, timer: null };
    render();
  });

  var btnKey = document.getElementById("btnKey");
  if (btnKey) btnKey.addEventListener("click", function () {
    if (S.showKey) { S.showKey = false; render(); return; }
    var code = window.prompt("Facilitator passcode:");
    if (code && code.trim().toLowerCase() === CONFIG.facilitatorPasscode) { S.showKey = true; render(); }
  });

  if (!item) return;

  var btnVerify = document.getElementById("btnVerify");
  var huntInput = document.getElementById("huntInput");
  function doVerify() {
    var raw = huntInput.value || "";
    if (!raw.trim()) return;
    var ok = item.answers.indexOf("ANY") >= 0 ? true : item.answers.some(function (a) {
      return norm(a) === norm(raw) || normTight(a) === normTight(raw);
    });
    if (ok) { S.entries[item.id] = raw.trim(); completeItem(item); }
    else { document.getElementById("missMsg").textContent = "Not a match. Check the record and try again."; }
  }
  if (btnVerify) btnVerify.addEventListener("click", doVerify);
  if (huntInput) huntInput.addEventListener("keydown", function (e) { if (e.key === "Enter") doVerify(); });

  document.querySelectorAll(".quiz-opt").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var idx = parseInt(btn.getAttribute("data-idx"), 10);
      if (idx === item.correct) { completeItem(item); }
      else {
        var arr = S.pickedWrong[item.id] || (S.pickedWrong[item.id] = []);
        if (arr.indexOf(idx) < 0) {
          arr.push(idx);
          S.score = Math.max(0, S.score - POINTS.wrongQuizCost);
          btn.classList.add("picked");
          updateScoreChip();
        }
      }
    });
  });

  document.querySelectorAll(".multi-opt").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var idx = parseInt(btn.getAttribute("data-idx"), 10);
      var arr = S.multiSel[item.id] || (S.multiSel[item.id] = []);
      var pos = arr.indexOf(idx);
      if (pos >= 0) { arr.splice(pos, 1); btn.classList.remove("selected"); }
      else { arr.push(idx); btn.classList.add("selected"); }
    });
  });
  var btnMulti = document.getElementById("btnMultiSubmit");
  if (btnMulti) btnMulti.addEventListener("click", function () {
    var sel = (S.multiSel[item.id] || []).slice().sort().join(",");
    var want = item.corrects.slice().sort().join(",");
    if (sel === want) completeItem(item);
    else {
      S.score = Math.max(0, S.score - POINTS.wrongQuizCost);
      updateScoreChip();
      document.getElementById("missMsg").textContent = "Not quite. Reconsider your selections and submit again.";
    }
  });

  var btnHint = document.getElementById("btnHint");
  if (btnHint) btnHint.addEventListener("click", function () {
    S.hintsOpen[item.id] = !S.hintsOpen[item.id];
    if (S.hintsOpen[item.id] && !S.hintsUsed[item.id]) {
      S.hintsUsed[item.id] = true;
      S.score = Math.max(0, S.score - POINTS.hintCost);
      updateScoreChip();
    }
    document.getElementById("hintText").classList.toggle("hidden", !S.hintsOpen[item.id]);
    btnHint.textContent = S.hintsOpen[item.id] ? "Hide hint" : "Need a hint? (−" + POINTS.hintCost + " pts)";
  });
}

document.getElementById("logoImg").src = LOGO;
render();
</script>
</body>
</html>
